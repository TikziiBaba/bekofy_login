<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekofy - Yükleniyor...</title>
  <link rel="stylesheet" href="../css/splash.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <div class="splash-container">

    <!-- Logo -->
    <div class="logo-icon">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="url(#logoGrad)" />
        <path d="M16 14C16 14 32 18 32 24C32 30 16 34 16 34" stroke="white" stroke-width="3" stroke-linecap="round"
          fill="none" />
        <path d="M16 20C16 20 28 22 28 24C28 26 16 28 16 28" stroke="white" stroke-width="3" stroke-linecap="round"
          fill="none" />
        <path d="M16 25C16 25 22 23.5 22 24C22 24.5 16 25 16 25" stroke="white" stroke-width="3" stroke-linecap="round"
          fill="none" />
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
            <stop offset="0%" stop-color="#1DB954" />
            <stop offset="100%" stop-color="#1ed760" />
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Brand Name -->
    <h1 class="brand-name">Bekofy</h1>

    <!-- Tagline -->
    <p class="brand-tagline" id="randomTagline">Tık Tık Müzik</p>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const isAdmin = urlParams.get('admin') === 'true';
      const el = document.getElementById('randomTagline');

      if (isAdmin) {
        el.textContent = "Yönetici Ayrıcalıklarıyla Başlatıldı";
        el.style.color = "#ff4d4d"; // Orijinal yeşil/beyaz dışı dikkat çekici bir renk
        el.style.fontWeight = "bold";
      } else {
        const taglines = [
          "bekir egoistin teki",
          "Hadi S*ktir ordan",
          "Çarşı Pazar Karışır",
          "bekir yine haklıydı",
          "bu uygulama efsane ya",
          "Mamasa Mamasay Mama kossa",
          "İban Yolla",
          "bekir bi dahidir aslında",
          "Ufak hataları herkes yapar",
          "Bekir hala ona aşık",
          "bekofy turp gibidir",
          "bekir senden iyi bilir",
          "ansızın kapanabilir",
          "i miss you @mk",
          "bekir bunu da düşünmüş",
          "Bekofy'ı yaparken bizde elma müzik dinliyorduk",
          "Tık Tık Müzik",
          "bekir olmasa bu uygulama olmazdı",
          "Bojack neden beni aradın",
          "İyi ki varsın Eren"
        ];
        el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
      }
    </script>

    <!-- Loading Bar -->
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>

  </div>

</body>

</html>
