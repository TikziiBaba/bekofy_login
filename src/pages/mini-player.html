<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekofy - Mini Player</title>
  <link rel="stylesheet" href="../css/mini-player.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="mini-player" id="mini-player">
    <!-- Draggable Titlebar -->
    <div class="mini-titlebar" id="mini-titlebar">
      <div class="mini-titlebar-controls">
        <button class="mini-btn-back" id="mini-btn-back" title="Ana Pencereye Dön">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42a.996.996 0 00-1.41 0l-6.59 6.59a.996.996 0 000 1.41l6.59 6.59a.996.996 0 101.41-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
        </button>
        <button class="mini-btn-close" id="mini-btn-close" title="Kapat">
          <svg viewBox="0 0 12 12" width="10" height="10"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
      </div>
    </div>

    <!-- Background blur layer -->
    <div class="mini-bg" id="mini-bg"></div>

    <!-- Content -->
    <div class="mini-content">
      <!-- Cover Art -->
      <div class="mini-cover" id="mini-cover">
        <svg viewBox="0 0 24 24" fill="currentColor" opacity="0.3" width="28" height="28"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>

      <!-- Song Info -->
      <div class="mini-info">
        <div class="mini-title" id="mini-title">Şarkı seçilmedi</div>
        <div class="mini-artist" id="mini-artist">—</div>
      </div>

      <!-- Controls -->
      <div class="mini-controls">
        <button class="mini-ctrl" id="mini-prev" title="Önceki">
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M3.3 1a.7.7 0 01.7.7v5.15l9.95-5.744a.7.7 0 011.05.606v12.575a.7.7 0 01-1.05.607L4 9.15v5.15a.7.7 0 01-1.4 0V1.7a.7.7 0 01.7-.7z"/></svg>
        </button>
        <button class="mini-play-btn" id="mini-play" title="Oynat/Duraklat">
          <svg viewBox="0 0 16 16" fill="currentColor" id="mini-icon-play"><path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/></svg>
          <svg viewBox="0 0 16 16" fill="currentColor" id="mini-icon-pause" style="display:none"><path d="M2.7 1a.7.7 0 00-.7.7v12.6a.7.7 0 00.7.7h2.6a.7.7 0 00.7-.7V1.7a.7.7 0 00-.7-.7H2.7zm8 0a.7.7 0 00-.7.7v12.6a.7.7 0 00.7.7h2.6a.7.7 0 00.7-.7V1.7a.7.7 0 00-.7-.7h-2.6z"/></svg>
        </button>
        <button class="mini-ctrl" id="mini-next" title="Sonraki">
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M12.7 1a.7.7 0 00-.7.7v5.15L2.05 1.107A.7.7 0 001 1.713v12.575a.7.7 0 001.05.607L12 9.15v5.15a.7.7 0 001.4 0V1.7a.7.7 0 00-.7-.7z"/></svg>
        </button>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="mini-progress" id="mini-progress">
      <div class="mini-progress-fill" id="mini-progress-fill"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // Elements
    const coverEl = document.getElementById('mini-cover');
    const titleEl = document.getElementById('mini-title');
    const artistEl = document.getElementById('mini-artist');
    const bgEl = document.getElementById('mini-bg');
    const progressFill = document.getElementById('mini-progress-fill');
    const playIcon = document.getElementById('mini-icon-play');
    const pauseIcon = document.getElementById('mini-icon-pause');

    // Receive song data updates from main process
    ipcRenderer.on('mini-player-update', (event, data) => {
      if (!data) return;

      // Update song info
      titleEl.textContent = data.title || 'Şarkı seçilmedi';
      artistEl.textContent = data.artist || '—';

      // Update cover
      if (data.cover_url) {
        coverEl.innerHTML = `<img src="${data.cover_url}" alt="" draggable="false">`;
        bgEl.style.backgroundImage = `url('${data.cover_url}')`;
      } else {
        coverEl.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" opacity="0.3" width="28" height="28"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
        bgEl.style.backgroundImage = '';
      }

      // Update play/pause
      if (data.isPlaying) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
    });

    // Progress update
    ipcRenderer.on('mini-player-progress', (event, data) => {
      if (data && data.percent !== undefined) {
        progressFill.style.width = data.percent + '%';
      }
    });

    // Controls
    document.getElementById('mini-play').addEventListener('click', () => {
      ipcRenderer.send('mini-player-command', 'toggle-play');
    });
    document.getElementById('mini-next').addEventListener('click', () => {
      ipcRenderer.send('mini-player-command', 'next');
    });
    document.getElementById('mini-prev').addEventListener('click', () => {
      ipcRenderer.send('mini-player-command', 'prev');
    });

    // Back to main window
    document.getElementById('mini-btn-back').addEventListener('click', () => {
      ipcRenderer.send('mini-player-command', 'back-to-main');
    });

    // Close mini player
    document.getElementById('mini-btn-close').addEventListener('click', () => {
      ipcRenderer.send('mini-player-command', 'close');
    });

    // Progress bar click
    document.getElementById('mini-progress').addEventListener('click', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const percent = ((e.clientX - rect.left) / rect.width) * 100;
      ipcRenderer.send('mini-player-command', 'seek', percent);
    });
  </script>
</body>
</html>
